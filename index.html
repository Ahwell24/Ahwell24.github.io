<!DOCTYPE html>
  <html lang="tr">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motika - Aliskanlik Takibi</title>
  <meta name="description" content="Motika ile aliskanliklarini takip et, hedeflerine ulas ve streaklerini koru.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0D0D1A;
    color: #fff;
        min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}
  h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem;
    background: linear-gradient(135deg, #A78BFA, #7C3AED);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { font-size: 1.2rem; color: #9CA3AF; max-width: 500px; line-height: 1.6; }
  .badge { margin-top: 2rem; }
  .badge a { 
    display: inline-block; background: linear-gradient(135deg, #7C3AED, #A78BFA);
          color: white; padding: 14px 32px; border-radius: 50px;
    text-decoration: none; font-weight: 600; font-size: 1rem;
    transition: transform 0.2s; }
  .badge a:hover { transform: scale(1.05); }
  footer { margin-top: 3rem; color: #4B5563; font-size: 0.85rem; }
</style>
  </head>
  <body>
    <h1> Motika</h1>
    <p>Aliskanliklarini takip et, streaklerini koru ve her gun daha iyi bir sen ol.</p>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=com.ahmetfaruk.motivasyonaliskanlik" target="_blank">
        Google Play'den Indir
      </a>
    </div>
    <footer>
      <p>Iletisim: sifirtaviz@gmail.com</p>
    </footer>
  </body>
  </html>
